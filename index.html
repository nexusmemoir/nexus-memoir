<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoAds — Geopolymer Adsorpsiyon Platformu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#F4F2ED;--bg2:#E8E5DE;--surface:#FFFFFF;--border:#D6D2C8;
  --text:#1C1B18;--text2:#6B6860;--accent:#0B9AA8;--accent2:#087988;
  --green:#16A34A;--amber:#D97706;--red:#DC2626;--purple:#7C3AED;
  --sidebar:250px;--r:10px;
  --mono:'IBM Plex Mono',monospace;--serif:'Fraunces',serif;
}
[data-theme="dark"]{
  --bg:#0D1117;--bg2:#161B22;--surface:#1C2128;--border:#2D333B;
  --text:#CDD9E5;--text2:#768390;--accent:#2DD4BF;--accent2:#0FB8A5;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--mono);background:var(--bg);color:var(--text);display:flex;min-height:100vh;transition:background .3s,color .3s;font-size:14px}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);position:fixed;height:100vh;display:flex;flex-direction:column;transition:background .3s,border-color .3s;z-index:200}
.logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-name{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.logo-sub{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin-top:2px}
nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:7px;background:none;border:none;color:var(--text2);font-family:var(--mono);font-size:13px;cursor:pointer;width:100%;text-align:left;transition:all .15s}
.nav-btn:hover{background:var(--bg);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff;font-weight:500}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sidebar-foot{padding:14px 10px;border-top:1px solid var(--border)}
.theme-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;background:none;border:1px solid var(--border);border-radius:7px;color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;transition:background .3s,border-color .3s}
.page-h{font-family:var(--serif);font-size:20px;font-weight:600}
.topbar-sub{font-size:11px;color:var(--text2);letter-spacing:.5px}
.content{padding:28px 32px;flex:1;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.sec{margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:background .3s,border-color .3s}
.card-h{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-h-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;transition:all .3s}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.stat-val{font-family:var(--serif);font-size:34px;font-weight:700;color:var(--accent);line-height:1;margin:6px 0 4px}
.stat-val sup{font-size:14px;font-weight:400}
.stat-note{font-size:11px;color:var(--text2)}
.prog{width:100%;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .6s ease}
.tbl-wrap{overflow-x:auto;max-height:520px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 11px;text-align:left;background:var(--bg);color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10}
td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.b-green{background:rgba(22,163,74,.12);color:var(--green)}
.b-amber{background:rgba(217,119,6,.12);color:var(--amber)}
.b-blue{background:rgba(11,154,168,.12);color:var(--accent)}
.b-red{background:rgba(220,38,38,.12);color:var(--red)}
.b-purple{background:rgba(124,58,237,.12);color:var(--purple)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:var(--accent2)}
.btn-o{background:none;border:1px solid var(--border);color:var(--text)}
.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 10px;font-size:11px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-family:var(--mono);font-size:13px;color:var(--text);outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--accent)}
select.fi{cursor:pointer}
.fgrid{display:grid;gap:10px}
.fgrid-2{grid-template-columns:repeat(2,1fr)}
.fgrid-3{grid-template-columns:repeat(3,1fr)}
.fbox{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:16px 20px;font-family:var(--mono);font-size:14px;color:var(--accent);letter-spacing:.3px;min-height:52px;word-break:break-all}
.phase{border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.ph-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--surface);transition:background .15s}
.ph-head:hover{background:var(--bg)}
.ph-title{font-family:var(--serif);font-size:14px;font-weight:600}
.ph-meta{font-size:11px;color:var(--text2);margin-top:2px}
.ph-body{padding:12px 18px;background:var(--bg);display:none}
.ph-body.open{display:block}
.task{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:12px;border-bottom:1px solid var(--border)}
.task:last-child{border-bottom:none}
.task-cb{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.task-text.done{text-decoration:line-through;color:var(--text2)}
.task-sel{margin-left:auto;font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-family:var(--mono);color:var(--text2);cursor:pointer;outline:none}
.calc-res{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);border-radius:var(--r);padding:36px 24px;text-align:center;color:#fff;animation:fadeUp .4s ease}
.calc-res-label{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:1px}
.calc-res-val{font-family:var(--serif);font-size:56px;font-weight:700;line-height:1;margin:8px 0}
.calc-res-sub{font-size:12px;opacity:.75}
.warn{background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--amber);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.info-box{background:rgba(11,154,168,.07);border:1px solid rgba(11,154,168,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text2);line-height:1.8}
.code-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:var(--mono);font-size:11px;color:var(--text);white-space:pre;overflow-x:auto;line-height:1.7}
.divider{height:1px;background:var(--border);margin:18px 0}
.row-flex{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ml-auto{margin-left:auto}
.gap-top{margin-top:14px}
.gap-sm{margin-top:8px}
.txt-sm{font-size:11px;color:var(--text2)}
.txt-xs{font-size:10px;color:var(--text2)}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fi-sm{padding:6px 10px;font-size:12px;border-radius:6px;max-width:180px}
.detail-panel{position:fixed;right:0;top:0;height:100vh;width:480px;background:var(--surface);border-left:1px solid var(--border);z-index:500;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;padding:24px}
.detail-panel.open{transform:translateX(0)}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:499;display:none}
.detail-overlay.open{display:block}
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:12px}
.detail-row:last-child{border-bottom:none}
.detail-key{color:var(--text2);flex-shrink:0;min-width:170px;font-size:11px}
.detail-val{text-align:right;word-break:break-word}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-name">GeoAds</div>
    <div class="logo-sub">Araştırma Platformu</div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="go('dashboard')"><span class="nav-icon">◈</span>Dashboard</button>
    <button class="nav-btn" onclick="go('dataset')"><span class="nav-icon">◎</span>Literatür Dataset</button>
    <button class="nav-btn" onclick="go('workflow')"><span class="nav-icon">◻</span>İş Akışı</button>
    <button class="nav-btn" onclick="go('formula')"><span class="nav-icon">∑</span>Formül (PySR)</button>
    <button class="nav-btn" onclick="go('calculator')"><span class="nav-icon">⟡</span>Hesap Makinesi</button>
    <button class="nav-btn" onclick="go('config')"><span class="nav-icon">⚙</span>Ayarlar</button>
  </nav>
  <div class="sidebar-foot">
    <button class="theme-btn" onclick="toggleTheme()">
      <span id="th-ico">◑</span><span id="th-lbl">Koyu Mod</span>
    </button>
  </div>
</aside>

<div class="detail-overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
    <div style="font-family:var(--serif);font-size:16px;font-weight:600" id="dp-title">Kayıt Detayı</div>
    <button class="btn btn-o btn-sm" onclick="closeDetail()">✕ Kapat</button>
  </div>
  <div id="dp-body"></div>
</div>

<main class="main">
  <div class="topbar">
    <div><div class="page-h" id="ph">Dashboard</div></div>
    <div class="topbar-sub">Fly Ash Geopolymer · Metilen Mavisi Adsorpsiyonu</div>
  </div>
  <div class="content" id="content"></div>
</main>

<script>
const CFG={
  CSV_URL:   localStorage.getItem('cfg_csv')   ||'',
  SCRIPT_URL:localStorage.getItem('cfg_script')||'',
};

const S={
  page:'dashboard',data:[],filtered:[],
  tasks:  JSON.parse(localStorage.getItem('tasks') ||'{}'),
  formula:localStorage.getItem('formula')  ||'',
  formulaJS:localStorage.getItem('formulaJS')||'',
  perf:   JSON.parse(localStorage.getItem('perf')  ||'{}'),
  theme:  localStorage.getItem('theme')||'light',
  filterAct:'',filterClass:'',filterSearch:'',
};

document.documentElement.setAttribute('data-theme',S.theme);
syncThemeBtn();

/* ── COLUMNS ── */
const TABLE_COLS=[
  {k:'Record_ID',label:'ID'},
  {k:'Author',label:'Yazar'},
  {k:'Year',label:'Yıl'},
  {k:'Activation_Type',label:'Aktivasyon'},
  {k:'Activator_Type',label:'Aktivatör'},
  {k:'Curing_Temperature_C',label:'Kür °C'},
  {k:'Curing_Time_h',label:'Kür h'},
  {k:'Initial_Concentration_mgL',label:'MB mg/L'},
  {k:'Adsorbent_Dose_g',label:'Doz g'},
  {k:'Contact_Time_min',label:'Süre dk'},
  {k:'Temperature_C',label:'T °C'},
  {k:'pH',label:'pH'},
  {k:'Removal_Efficiency_percent',label:'Removal %'},
  {k:'Adsorption_Capacity_qe_mgg',label:'qe mg/g'},
  {k:'qmax_Langmuir_mgg',label:'qmax mg/g'},
  {k:'Data_Completeness',label:'Veri Kal.'},
];

const FORM_FIELDS=[
  {k:'Author',label:'Yazar(lar)',type:'text'},
  {k:'Year',label:'Yıl',type:'number'},
  {k:'Journal',label:'Dergi',type:'text'},
  {k:'Article_Title',label:'Makale Başlığı',type:'text'},
  {k:'DOI_or_URL',label:'DOI / URL',type:'text'},
  {k:'Country',label:'Ülke',type:'text'},
  {k:'Fly_Ash_Type',label:'Fly Ash Tipi',type:'select',opts:['Coal fly ash','MSW fly ash','Biomass fly ash','Fly ash + slag','Fly ash blended geopolymer','Diğer']},
  {k:'Fly_Ash_Class',label:'Fly Ash Sınıfı',type:'select',opts:['Class F','Class C','YOK']},
  {k:'SiO2_percent',label:'SiO₂ (%)',type:'number'},
  {k:'Al2O3_percent',label:'Al₂O₃ (%)',type:'number'},
  {k:'CaO_percent',label:'CaO (%)',type:'number'},
  {k:'Activation_Type',label:'Aktivasyon Tipi',type:'select',opts:['Alkali','Acid']},
  {k:'Activator_Type',label:'Aktivatör',type:'select',opts:['NaOH + Na2SiO3','H3PO4','NaOH','Na2SiO3','Diğer']},
  {k:'Activator_Concentration',label:'Aktivatör Kons.',type:'text'},
  {k:'FlyAsh_Activator_Ratio',label:'FA/Aktivatör Oranı',type:'number'},
  {k:'Curing_Temperature_C',label:'Kür Sıcaklığı (°C)',type:'number'},
  {k:'Curing_Time_h',label:'Kür Süresi (h)',type:'number'},
  {k:'Initial_Concentration_mgL',label:'Başlangıç Kons. (mg/L)',type:'number'},
  {k:'Adsorbent_Dose_g',label:'Adsorban Dozu (g)',type:'number'},
  {k:'Solution_Volume_mL',label:'Çözelti Hacmi (mL)',type:'number'},
  {k:'Contact_Time_min',label:'Temas Süresi (dk)',type:'number'},
  {k:'Temperature_C',label:'Sıcaklık (°C)',type:'number'},
  {k:'pH',label:'pH',type:'number'},
  {k:'Agitation_rpm',label:'Karıştırma (rpm)',type:'number'},
  {k:'Removal_Efficiency_percent',label:'Giderim Verimi (%)',type:'number'},
  {k:'Adsorption_Capacity_qe_mgg',label:'qe (mg/g)',type:'number'},
  {k:'qmax_Langmuir_mgg',label:'qmax Langmuir (mg/g)',type:'number'},
  {k:'Isotherm_Model',label:'İzoterm Modeli',type:'select',opts:['Langmuir','Freundlich','Langmuir/Freundlich','Sips','YOK']},
  {k:'Kinetic_Model',label:'Kinetik Model',type:'select',opts:['Pseudo-second-order','PSO','Pseudo-first-order','YOK']},
  {k:'R2_Isotherm',label:'R² (İzoterm)',type:'number'},
  {k:'R2_Kinetic',label:'R² (Kinetik)',type:'number'},
  {k:'Data_Completeness',label:'Veri Kalitesi',type:'select',opts:['High','Medium','Low']},
  {k:'Notes',label:'Notlar',type:'text'},
];

/* ── ROUTER ── */
const TITLES={dashboard:'Dashboard',dataset:'Literatür Dataset',workflow:'İş Akışı',formula:'Formül (PySR)',calculator:'Hesap Makinesi',config:'Ayarlar'};
function go(page){
  S.page=page;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    const map={dashboard:'Da',dataset:'Li',workflow:'İş',formula:'Fo',calculator:'He',config:'Ay'};
    b.classList.toggle('active',b.textContent.trim().startsWith(map[page]));
  });
  document.getElementById('ph').textContent=TITLES[page];
  const c=document.getElementById('content');
  c.style.animation='none';void c.offsetHeight;c.style.animation='fadeUp .3s ease';
  PAGES[page]();
}

function toggleTheme(){
  S.theme=S.theme==='light'?'dark':'light';
  localStorage.setItem('theme',S.theme);
  document.documentElement.setAttribute('data-theme',S.theme);
  syncThemeBtn();
  if(S.page==='dashboard') PAGES.dashboard();
}
function syncThemeBtn(){
  const ico=document.getElementById('th-ico'),lbl=document.getElementById('th-lbl');
  if(!ico)return;
  ico.textContent=S.theme==='dark'?'◐':'◑';
  lbl.textContent=S.theme==='dark'?'Açık Mod':'Koyu Mod';
}

/* ── SHEETS I/O ── */
async function loadData(){
  if(!CFG.CSV_URL){S.data=[];S.filtered=[];return;}
  try{
    const r=await fetch(CFG.CSV_URL+'&t='+Date.now());
    const txt=await r.text();
    S.data=parseCSV(txt);
    applyFilter();
  }catch(e){S.data=[];S.filtered=[];}
}

async function appendRow(row){
  if(!CFG.SCRIPT_URL){S.data.push(row);applyFilter();return{ok:true};}
  const r=await fetch(CFG.SCRIPT_URL,{method:'POST',body:JSON.stringify(row),headers:{'Content-Type':'application/json'}});
  return r.json();
}

function parseCSV(txt){
  const lines=txt.trim().split('\n');
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/\r/g,'').replace(/"/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vs=splitCSVLine(line);
    const o={};
    hdrs.forEach((h,i)=>o[h]=(vs[i]||'').trim().replace(/\r/g,'').replace(/^"|"$/g,''));
    return o;
  });
}

function splitCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){result.push(cur);cur='';}
    else cur+=line[i];
  }
  result.push(cur);
  return result;
}

function applyFilter(){
  S.filtered=S.data.filter(r=>{
    if(S.filterAct&&r.Activation_Type!==S.filterAct)return false;
    if(S.filterClass&&r.Fly_Ash_Class!==S.filterClass)return false;
    if(S.filterSearch){
      const q=S.filterSearch.toLowerCase();
      return(r.Author||'').toLowerCase().includes(q)||(r.Article_Title||'').toLowerCase().includes(q)||(r.Journal||'').toLowerCase().includes(q);
    }
    return true;
  });
}

/* ── PAGES ── */
const PAGES={

  dashboard(){
    const d=S.data,n=d.length;
    const wr=d.filter(r=>r.Removal_Efficiency_percent&&r.Removal_Efficiency_percent!=='YOK'&&r.Removal_Efficiency_percent!=='');
    const avgR=wr.length?(wr.reduce((s,r)=>s+num(r.Removal_Efficiency_percent),0)/wr.length).toFixed(1):'—';
    const wq=d.filter(r=>r.qmax_Langmuir_mgg&&r.qmax_Langmuir_mgg!=='YOK'&&r.qmax_Langmuir_mgg!=='');
    const avgQ=wq.length?(wq.reduce((s,r)=>s+num(r.qmax_Langmuir_mgg),0)/wq.length).toFixed(1):'—';
    const acidC=d.filter(r=>r.Activation_Type==='Acid').length;
    const pct=Math.min(n/70*100,100).toFixed(0);

    C(`
    <div class="sec g4">
      <div class="stat">
        <div class="stat-label">Toplam Kayıt</div>
        <div class="stat-val">${n}</div>
        <div class="stat-note">Hedef 60–80 · ${wr.length} removal verisi var</div>
        <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Ort. Removal Verimi</div>
        <div class="stat-val">${avgR}<sup>%</sup></div>
        <div class="stat-note">${wr.length} kayıt üzerinden</div>
      </div>
      <div class="stat">
        <div class="stat-label">Ort. qmax Langmuir</div>
        <div class="stat-val">${avgQ}<sup style="font-size:11px">mg/g</sup></div>
        <div class="stat-note">${wq.length} kayıt üzerinden</div>
      </div>
      <div class="stat">
        <div class="stat-label">Asit (H₃PO₄) Kayıt</div>
        <div class="stat-val">${acidC}</div>
        <div class="stat-note">Alkali: ${n-acidC} kayıt</div>
      </div>
    </div>

    <div class="sec g2">
      <div class="card">
        <div class="card-h"><span class="card-h-dot"></span>Aktivasyon Tipi Dağılımı</div>
        <canvas id="pieChart" height="180"></canvas>
      </div>
      <div class="card">
        <div class="card-h"><span class="card-h-dot"></span>Kür Sıcaklığı vs Removal %</div>
        <canvas id="scatterChart" height="180"></canvas>
      </div>

/* ── HELPERS ── */
function fullTable(data){
  if(!data.length)return'<div style="text-align:center;padding:40px;color:var(--text2)">Kayıt bulunamadı. Sheets bağlantısını kontrol edin.</div>';
  const rBadge=v=>{
    if(!v||v==='YOK'||v==='')return'<span style="color:var(--text2)">YOK</span>';
    const vv=v.replace('~','').replace('%','');
    const n=parseFloat(vv);
    const cls=n>=90?'b-green':n>=75?'b-amber':'b-red';
    return`<span class="badge ${cls}">${v}%</span>`;
  };
  const aBadge=v=>{
    if(!v||v==='YOK')return'<span style="color:var(--text2)">—</span>';
    return v==='Acid'?`<span class="badge b-purple">${v}</span>`:`<span class="badge b-blue">${v}</span>`;
  };
  const qBadge=v=>{
    const cls={High:'b-green',Medium:'b-amber',Low:'b-red'}[v]||'';
    return cls?`<span class="badge ${cls}">${v}</span>`:`<span style="color:var(--text2)">${v||'—'}</span>`;
  };
  return`<table>
    <thead><tr>${TABLE_COLS.map(c=>`<th>${c.label}</th>`).join('')}<th></th></tr></thead>
    <tbody>${data.map((r,i)=>`<tr>
      ${TABLE_COLS.map(c=>{
        if(c.k==='Removal_Efficiency_percent')return`<td>${rBadge(r[c.k])}</td>`;
        if(c.k==='Activation_Type')return`<td>${aBadge(r[c.k])}</td>`;
        if(c.k==='Data_Completeness')return`<td>${qBadge(r[c.k])}</td>`;
        if(c.k==='Author')return`<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis" title="${escH(r[c.k]||'')}">${r[c.k]||'—'}</td>`;
        const v=r[c.k];
        return`<td>${(!v||v==='YOK'||v==='')?'<span style="color:var(--text2)">YOK</span>':escH(v)}</td>`;
      }).join('')}
      <td><button class="btn btn-o btn-sm" onclick="openDetail(${i})">→</button></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function miniTable(data){
  if(!data.length)return'<div class="txt-sm">Sheets bağlandıktan sonra kayıtlar burada görünecek.</div>';
  return`<table>
    <thead><tr><th>Yazar</th><th>Yıl</th><th>Aktivasyon</th><th>Kür °C</th><th>MB mg/L</th><th>Removal</th></tr></thead>
    <tbody>${data.map(r=>`<tr>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${r.Author||'—'}</td>
      <td>${r.Year||'—'}</td>
      <td><span class="tag">${r.Activation_Type||'—'}</span></td>
      <td>${r.Curing_Temperature_C||'—'}</td>
      <td>${r.Initial_Concentration_mgL||'—'}</td>
      <td>${(r.Removal_Efficiency_percent&&r.Removal_Efficiency_percent!=='YOK'&&r.Removal_Efficiency_percent!=='')
        ?`<span class="badge ${num(r.Removal_Efficiency_percent.replace('~',''))>=90?'b-green':'b-amber'}">${r.Removal_Efficiency_percent}%</span>`
        :'<span style="color:var(--text2)">YOK</span>'}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

    Object.entries(r).filter(([k])=>k).map(([k,v])=>`

  const el=document.getElementById('pieChart');if(!el||!S.data.length)return;
  if(charts.pie)charts.pie.destroy();
  const alkali=S.data.filter(r=>r.Activation_Type==='Alkali').length;
  const acid=S.data.filter(r=>r.Activation_Type==='Acid').length;
  const other=S.data.length-alkali-acid;
  charts.pie=new Chart(el,{type:'doughnut',data:{labels:['Alkali','Asit (H₃PO₄)','Diğer'],datasets:[{data:[alkali,acid,other],backgroundColor:['rgba(11,154,168,.7)','rgba(124,58,237,.7)','rgba(107,104,96,.4)'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}}}}});
}
function drawScatterChart(){
  const el=document.getElementById('scatterChart');if(!el||!S.data.length)return;
  if(charts.sc)charts.sc.destroy();
  const pts=S.data.filter(r=>r.Curing_Temperature_C&&r.Removal_Efficiency_percent&&r.Removal_Efficiency_percent!=='YOK'&&r.Removal_Efficiency_percent!=='')
    .map(r=>({x:num(r.Curing_Temperature_C),y:num(r.Removal_Efficiency_percent.replace('~','')),act:r.Activation_Type}));
  charts.sc=new Chart(el,{type:'scatter',data:{datasets:[
    {label:'Alkali',data:pts.filter(p=>p.act==='Alkali'),backgroundColor:'rgba(11,154,168,.65)',pointRadius:6},
    {label:'Acid',data:pts.filter(p=>p.act==='Acid'),backgroundColor:'rgba(124,58,237,.65)',pointRadius:6},
  ]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}}},scales:{
    x:{title:{display:true,text:'Kür Sıcaklığı (°C)',font:{size:10}},grid:{color:'rgba(128,128,128,.1)'}},
    y:{title:{display:true,text:'Removal (%)',font:{size:10}},min:0,max:100}
  }}});
}

/* ── ACTIONS ── */
function toggleForm(){const f=document.getElementById('add-form');f.style.display=f.style.display==='none'?'block':'none';}

async function saveRow(){
  const row={};
  row.Record_ID='M'+String(S.data.length+1).padStart(3,'0');
  FORM_FIELDS.forEach(f=>{row[f.k]=gi('ff-'+f.k)||'YOK';});
  const btn=document.getElementById('save-btn');
  btn.textContent='Kaydediliyor…';btn.disabled=true;
  await appendRow(row);
  await loadData();
  btn.textContent='Kaydet';btn.disabled=false;
  toggleForm();
  PAGES.dataset();
  showToast('Kayıt eklendi ✓');
}

async function refreshDS(){await loadData();PAGES.dataset();}

function setFilter(type,val){
  if(type==='search')S.filterSearch=val;
  if(type==='act')S.filterAct=val;
  if(type==='class')S.filterClass=val;
  applyFilter();
  const tw=document.getElementById('tbl-wrap');
  if(tw)tw.innerHTML=fullTable(S.filtered);
  const cnt=document.getElementById('rec-count');
  if(cnt)cnt.textContent=`${S.filtered.length} / ${S.data.length} kayıt`;
}

function togglePhase(id){document.getElementById('pb-'+id).classList.toggle('open');}
function checkTask(id,val){
  S.tasks[id]=val;localStorage.setItem('tasks',JSON.stringify(S.tasks));
  const span=document.querySelector(`[onchange="checkTask('${id}',this.checked)"]`)?.nextElementSibling;
  if(span)span.classList.toggle('done',val);
}
function setWho(id,val){S.tasks[id+'_w']=val;localStorage.setItem('tasks',JSON.stringify(S.tasks));}
function saveFormula(){
  S.formula=gi('f-str');S.formulaJS=gi('f-js');
  localStorage.setItem('formula',S.formula);localStorage.setItem('formulaJS',S.formulaJS);
  document.getElementById('fdisplay').innerHTML=S.formula||'—';
  showToast('Formül kaydedildi ✓');
}
function savePerf(){
  S.perf={r2:gi('p-r2'),rmse:gi('p-rmse'),mae:gi('p-mae'),type:gi('p-type')};
  localStorage.setItem('perf',JSON.stringify(S.perf));showToast('Metrikler kaydedildi ✓');
}
function saveCfg(){
  CFG.CSV_URL=gi('cfg-csv');CFG.SCRIPT_URL=gi('cfg-sc');
  localStorage.setItem('cfg_csv',CFG.CSV_URL);localStorage.setItem('cfg_script',CFG.SCRIPT_URL);
  showToast('Kaydedildi — Dataset sayfasında ↻ Yenile yapın.');
}
function calc(){
  if(!S.formulaJS){document.getElementById('calc-out').innerHTML=`<div class="warn">JS formülü girilmemiş.</div>`;return;}
  const C=num(gi('c-C')),ratio=num(gi('c-ratio')),T_kur=num(gi('c-T_kur')),t_kur=num(gi('c-t_kur'));
  const t_ads=num(gi('c-t_ads')),dose=num(gi('c-dose')),T_ads=num(gi('c-T_ads')),pH=num(gi('c-pH'));
  let result,err=false;
  try{result=eval(S.formulaJS);result=Math.min(100,Math.max(0,parseFloat(result)));if(isNaN(result))throw 0;}
  catch{err=true;}
  document.getElementById('calc-out').innerHTML=err
    ?`<div class="warn">Formül hesaplanamadı. JS ifadesini kontrol edin.</div>`
    :`<div class="calc-res"><div class="calc-res-label">Tahmini Giderim Verimi</div><div class="calc-res-val">${result.toFixed(1)}<span style="font-size:28px">%</span></div><div class="calc-res-sub">${S.perf.type||'PySR'} modeli · R²=${S.perf.r2||'?'}</div></div>`;
}

function C(html){document.getElementById('content').innerHTML=html;}
function gi(id){return document.getElementById(id)?.value||'';}
function num(v){return parseFloat(v)||0;}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function showToast(msg){
  const t=document.createElement('div');t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'24px',right:'24px',background:'var(--accent)',color:'#fff',padding:'10px 18px',borderRadius:'8px',fontFamily:'var(--mono)',fontSize:'13px',zIndex:'9999',boxShadow:'0 4px 20px rgba(0,0,0,.2)'});
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}

loadData().then(()=>go('dashboard'));
</script>
